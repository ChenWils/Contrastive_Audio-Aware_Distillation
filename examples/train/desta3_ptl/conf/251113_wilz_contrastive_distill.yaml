hydra:
  run:
    dir: ${exp_dir}


project: pytorch_lightning
name: RB_contrastive_distill_desta2_llama32_3B
exp_dir: ???

resume_from_checkpoint: null
init_from_pretrained_weights: null

ptl_module: wilz_contrastive_distill

wandb:
  project: test
  log_model: all

trainer:
  devices: [0] # 0 for CPU, or list of the GPUs to use e.g. [0, 1] or [0]
  num_nodes: 1
  max_epochs: 10
  max_steps: -1 # precedence over max_epochs
  accumulate_grad_batches: 1 # accumulates grads every k batches
  gradient_clip_val: 1.0
  precision: "bf16-mixed" #16 # should be set to 16 for O1 and O2 to enable the AMP.
  accelerator: gpu
  log_every_n_steps: 10  # interval of logging.
  val_check_interval: 1.0  # set to 0.25 to check 4 times per epoch, or an int for number of iterations
  num_sanity_val_steps: 0 # number of steps to perform validation steps for sanity check the validation process before starting the training, setting to 0 disables it
  enable_checkpointing: True
  # strategy: ddp_find_unused_parameters_true
  # strategy: ddp

model:
  add_noise: False
  # Knowledge Distillation parameters
  kd_alpha: 0.7                      # Weight for KD loss vs NTP loss (0-1)
  kd_temperature: 2.0                # Temperature for KL divergence (used for use_standard_kd and use_logit_contrastive)
  contrastive_beta: 2.0              # β for LOGIT contrastive: (1+β)*with_audio - β*without_audio
  repr_contrastive_beta: 0.0         # β for REPRESENTATION contrastive (if not set, uses contrastive_beta)
                                      # Set to 0 for NON-contrastive mode (uses teacher with audio only)

  # Loss component flags (at least one must be true)
  # Recommended: use_logit_contrastive=true + use_repr_contrastive=true (pure contrastive)
  use_standard_kd: false            # Standard KL divergence (with-audio teacher only, no contrastive)
  use_logit_contrastive: true        # Logit-level contrastive loss (KL divergence on contrastive logits)
  use_repr_contrastive: false        # Representation-level contrastive loss (MSE on contrastive hidden states)

  repr_contrastive_loss_type: "mse" #"cross_attention"  # or "mse"
  cross_attn_loss_scale: 10.0

  # Multi-layer distillation (for repr_contrastive with MSE or cross_attention mode!)
  # NOTE: Logit contrastive and standard KD always use final layer only
  # MSE and cross_attention both use LAYER-SPECIFIC projections for each layer pair!
  distill_layer_mode: "average"              # Options: "last" or "average"

  # AUTO-SAMPLING (like CoD): Sample every Nth layer automatically
  distill_student_step: 7                    # Sample every 7th student layer (default: 7)
  distill_teacher_step: 8                    # Sample every 8th teacher layer (default: 8)
  # Example: With 3B (28 layers) and 8B (32 layers):
  #   Student samples: [0, 7, 14, 21, 28] → layers 0, 7, 14, 21, 28
  #   Teacher samples: [0, 8, 16, 24, 32] → layers 0, 8, 16, 24, 32
  entropy_calculation: true        # Training entropy (teacher logits, first epoch only)
  enable_eval_entropy: true        # Evaluation entropy (student logits on ground truth)

  target_mode: response

  llm:
    model_id: /home/chenwils/llama3.2_3B_Instruct
    freeze: True

  encoder:
    model_id: openai/whisper-medium
    freeze: True

  connector:
    mode: qformer_1
    prompt_size: 64
    num_hidden_layers: 2

  generation_kwargs:
    max_new_tokens: 80
    do_sample: False
    temperature: 1
    top_p: 1

teacher_model:
  llm:
    model_id: /home/chenwils/llama3.2_8B_from_11B
    freeze: True

  encoder:
    model_id: openai/whisper-medium
    freeze: True

  connector:
    mode: qformer_1
    prompt_size: 64
    num_hidden_layers: 2

  generation_kwargs:
    max_new_tokens: 80
    do_sample: False
    temperature: 1
    top_p: 1
  ckpt_path: /home/chenwils/DeSTA3-dev-main/data/teacher_ckpt/llama_31_8B/250306-13@rdesta2/pytorch_lightning/3b88q8kb/checkpoints/epoch=10-step=77560.ckpt


optim:
  lr: 1e-4
  betas: [0.9, 0.98]
  weight_decay: 0.01

  sched:
    warmup_steps: 2000


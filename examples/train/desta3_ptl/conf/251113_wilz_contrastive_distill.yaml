# ============================================================================
# Configuration Notes:
# ============================================================================
#
# This config uses HYBRID distillation:
#   - use_standard_kd: true           (KL divergence on with-audio only)
#   - use_logit_contrastive: false    (KL divergence on contrastive logits - UPDATED!)
#   - use_repr_contrastive: true      (MSE or cross-attention on contrastive representations)
#   - repr_contrastive_loss_type: "cross_attention"
#
# The teacher model performs TWO forward passes:
#   1. WITH audio (positive pair) - full multimodal input
#   2. WITHOUT audio (negative pair) - text-only embeddings
#
# Contrastive formula: (1 + contrastive_beta) * with_audio - contrastive_beta * without_audio
#
# IMPORTANT NOTES:
# 1. kd_temperature (2.0) applies to BOTH use_standard_kd and use_logit_contrastive
#    since logit contrastive loss uses KL divergence (not MSE)
# 2. TWO SEPARATE BETA VALUES (NEW!):
#    - contrastive_beta: Controls logit contrastive formula
#    - repr_contrastive_beta: Controls representation contrastive formula
#    - Setting repr_contrastive_beta=0 → NON-CONTRASTIVE mode (teacher with audio only)
#    - This allows mixing contrastive and non-contrastive losses!
# 3. LOSS WEIGHTING (matches CoD):
#    - Logit losses (standard_kd OR logit_contrastive): 70% weight
#    - Representation loss (repr_contrastive): 30% weight
#    This follows the same 70-30 split as wilz_CoD_distill.py
# 4. Multi-layer distillation (distill_layer_mode="average") works for:
#    - repr_contrastive with MSE mode (NEW! Each layer pair has its own projection)
#    - repr_contrastive with cross_attention mode (Each layer pair has its own projection)
#    Does NOT work for: standard_kd, logit_contrastive (always use final layer only)
#
# ============================================================================
# Multi-Layer Distillation (NEW!)
# ============================================================================
#
# Mode 1: "last" (default - original behavior)
#   distill_layer_mode: "last"
#   → Only distills the final layer representation
#   → Fastest, lowest memory, good baseline
#
# Mode 2: "average" (multi-layer distillation with AUTO-SAMPLING like CoD)
#   distill_layer_mode: "average"
#   distill_student_step: 7   # Sample every 7th student layer
#   distill_teacher_step: 8   # Sample every 8th teacher layer
#   → Automatically samples layers using step approach
#   → Richer knowledge transfer from multiple layers
#   → Computation scales with number of sampled layers
#
# AUTO-SAMPLING works like CoD:
#   student_hs[::step_s]  # Every Nth student layer
#   teacher_hs[::step_t]  # Every Nth teacher layer
#
# Example step configurations:
#
# 1. Default (RECOMMENDED, matches CoD):
#    distill_student_step: 7   # Samples ~4 layers from 28-layer model
#    distill_teacher_step: 8   # Samples ~4 layers from 32-layer model
#
# 2. Denser sampling:
#    distill_student_step: 4   # Samples ~7 layers
#    distill_teacher_step: 5   # Samples ~6 layers
#
# 3. Sparser sampling (faster):
#    distill_student_step: 14  # Samples ~2 layers
#    distill_teacher_step: 16  # Samples ~2 layers
#
# IMPORTANT: Multi-layer distillation behavior:
#       - Logit contrastive (use_logit_contrastive): Always uses FINAL LOGITS only
#       - Standard KD (use_standard_kd): Always uses FINAL LOGITS only
#       - Repr contrastive with MSE: NOW SUPPORTS MULTI-LAYER! (NEW!)
#       - Repr contrastive with cross_attention: Supports multi-layer
#       Both MSE and cross_attention use LAYER-SPECIFIC projection layers!
#
# ============================================================================
# Alternative Loss Configurations:
# ============================================================================
#
# Alternative configurations to try:
#
# 0. Pure Contrastive (RECOMMENDED - logit KL + repr MSE/cross-attn):
#    use_standard_kd: false
#    use_logit_contrastive: true
#    use_repr_contrastive: true
#    kd_alpha: 0.5
#    contrastive_beta: 0.5
#    repr_contrastive_beta: 0.5
#    kd_temperature: 2.0  # For logit contrastive KL divergence
#
# 0b. Logit Contrastive + Repr NON-Contrastive MSE (Like CoD's layer_level_loss):
#    use_standard_kd: false
#    use_logit_contrastive: true
#    use_repr_contrastive: true
#    repr_contrastive_loss_type: "mse"
#    kd_alpha: 0.5
#    contrastive_beta: 0.5         # Logit uses contrastive
#    repr_contrastive_beta: 0.0    # Repr does NOT use contrastive (teacher with audio only)
#    kd_temperature: 2.0
#    distill_layer_mode: "average" # Multi-layer MSE with auto-sampling (like CoD!)
#    distill_student_step: 7       # Every 7th student layer
#    distill_teacher_step: 8       # Every 8th teacher layer
#
# 1. Standard KD + Representation Contrastive (Hybrid):
#    use_standard_kd: true
#    use_logit_contrastive: false
#    use_repr_contrastive: true
#    kd_alpha: 0.5
#    contrastive_beta: 0.5
#    kd_temperature: 2.0  # For standard KD only
#
# 2. Logit Contrastive Only (KL divergence on contrastive logits):
#    use_standard_kd: false
#    use_logit_contrastive: true
#    use_repr_contrastive: false
#    kd_alpha: 0.5
#    contrastive_beta: 0.5
#    kd_temperature: 2.0  # Required for KL divergence
#
# 3. Representation Contrastive Only:
#    use_standard_kd: false
#    use_logit_contrastive: false
#    use_repr_contrastive: true
#    kd_alpha: 0.5
#    contrastive_beta: 0.5
#
# 4. All Three (experimental - combines standard KL + contrastive KL + contrastive MSE):
#    use_standard_kd: true
#    use_logit_contrastive: true
#    use_repr_contrastive: true
#    kd_alpha: 0.5
#    contrastive_beta: 0.5
#    kd_temperature: 2.0  # Applies to both standard_kd and logit_contrastive
#
# Hyperparameter tuning suggestions:
#   - kd_alpha: Try [0.3, 0.5, 0.7] to balance NTP vs KD loss
#   - contrastive_beta (logit): Try [0.3, 0.5, 0.7] to control logit contrastive weight
#   - repr_contrastive_beta (repr): Try [0.0, 0.3, 0.5, 0.7] to control repr contrastive weight
#     * 0.0 = NON-contrastive (like CoD's layer_level_loss)
#     * >0 = contrastive mode
#   - kd_temperature: Used for use_standard_kd and use_logit_contrastive (KL losses), try [1.0, 2.0, 4.0]
#
# ============================================================================
